<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - LS Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(180deg, #0099FF 0%, #00BFFF 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', Arial, sans-serif;
}
.box {
  text-align: center;
  width: 85%;
  max-width: 350px;
}
h2 {
  color: #FFD700;
  font-size: 22px;
  margin-bottom: 5px;
}
p {
  color: white;
  margin-bottom: 25px;
  font-size: 14px;
}
input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border: none;
  border-radius: 8px;
  background: white;
  font-size: 16px;
  outline: none;
}
input:focus {
  box-shadow: 0 0 0 2px #FFD700;
}
button {
  padding: 12px 30px;
  background: #4A5FFF;
  color: white;
  border: none;
  border-radius: 20px;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
  width: 100%;
  margin-bottom: 10px;
  transition: 0.2s;
}
button:hover {
  background: #3A4FFF;
  transform: scale(1.02);
}
button:disabled {
  background: #999;
  cursor: not-allowed;
}
.register-link {
  margin-top: 15px;
  color: white;
  font-size: 14px;
}
.register-link button {
  background: none;
  border: none;
  color: #FFD700;
  font-weight: bold;
  cursor: pointer;
  padding: 0;
  font-size: 14px;
  width: auto;
  display: inline;
}
.loading {
  display: none;
  color: white;
  font-size: 14px;
  margin-top: 10px;
}
</style>
</head>
<body>
<div class="box">
  <h2>LS Academy</h2>
  <p>Belajar Tanpa Batas</p>
  
  <input type="email" id="email" placeholder="EMAIL" autocomplete="email">
  <input type="password" id="password" placeholder="Password min 6 karakter" autocomplete="current-password">
  
  <button id="loginBtn">LOGIN</button>
  <div class="loading" id="loading">Mohon tunggu...</div>
  
  <div class="register-link">
    Belum punya akun? 
    <button id="registerBtn">Buat Akun</button>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const supabase = createClient(
  'https://rdziigwttjhnrmiutxbp.supabase.co',
  'sb_publishable_YOV4qY3s5M7W4u9vCcApnQ_-mdd6xXA'
)

// Cek session saat halaman dibuka
const { data: { session } = await supabase.auth.getSession()
if (session) {
  window.location.replace("dashboard.html")
}

// Fungsi loading
function setLoading(isLoading) {
  document.getElementById('loginBtn').disabled = isLoading
  document.getElementById('registerBtn').disabled = isLoading
  document.getElementById('loading').style.display = isLoading ? 'block' : 'none'
}

// Login
document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  
  if (!email || !password) {
    alert("Email dan password wajib diisi!")
    return
  }
  
  setLoading(true)
  const { error } = await supabase.auth.signInWithPassword({ email, password })
  setLoading(false)
  
  if (error) {
    alert("Login gagal: " + error.message)
  } else {
    window.location.replace("dashboard.html")
  }
})

// Register
document.getElementById('registerBtn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  
  if (!email || !password) {
    alert("Email dan password wajib diisi!")
    return
  }
  if (password.length < 6) {
    alert("Password minimal 6 karakter!")
    return
  }
  
  setLoading(true)
  const { error } = await supabase.auth.signUp({ email, password })
  setLoading(false)
  
  if (error) {
    alert("Gagal daftar: " + error.message)
  } else {
    alert("Akun berhasil dibuat! Cek email buat verifikasi, lalu login.")
  }
})
</script>
</body>
</html>
