<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - LS Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;height:100vh;background:linear-gradient(180deg,#0099FF 0%,#00BFFF 100%);display:flex;justify-content:center;align-items:center;font-family:'Segoe UI',Arial,sans-serif}
.box{text-align:center;width:85%;max-width:350px}
h2{color:#FFD700;font-size:22px;margin-bottom:5px}
p{color:white;margin-bottom:25px}
input{width:100%;padding:14px;margin-bottom:12px;border:none;border-radius:8px;background:white;box-sizing:border-box;font-size:16px}
button{padding:12px 30px;background:#4A5FFF;color:white;border:none;border-radius:20px;font-weight:bold;cursor:pointer;font-size:16px;width:100%;margin-bottom:10px}
.register-link{margin-top:15px;color:white;font-size:14px}
.register-link button{background:none;border:none;color:#FFD700;font-weight:bold;cursor:pointer;padding:0;font-size:14px;width:auto}
</style>
</head>
<body>
<div class="box">
<h2>LS Academy</h2>
<p>Belajar Tanpa Batas</p>
<input type="email" id="email" placeholder="EMAIL">
<input type="password" id="password" placeholder="Password min 6 karakter">
<button id="loginBtn">LOGIN</button>
<div class="register-link">Belum punya akun? <button id="registerBtn">Buat Akun</button></div>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
const supabase = createClient('https://rdziigwttjhnrmiutxbp.supabase.co','sb_publishable_YOV4qY3s5M7W4u9vCcApnQ_-mdd6xXA')
const { data: { session } = await supabase.auth.getSession()
if(session)window.location.replace("dashboard.html")
document.getElementById('loginBtn').addEventListener('click',async()=>{
const email=document.getElementById('email').value
const password=document.getElementById('password').value
if(!email||!password)return alert("Email dan password wajib diisi!")
const{error}=await supabase.auth.signInWithPassword({email,password})
if(error)alert("Login gagal: "+error.message)
else window.location.replace("dashboard.html")
})
document.getElementById('registerBtn').addEventListener('click',async()=>{
const email=document.getElementById('email').value
const password=document.getElementById('password').value
if(!email||!password)return alert("Email dan password wajib diisi!")
if(password.length<6)return alert("Password minimal 6 karakter!")
const{error}=await supabase.auth.signUp({email,password})
if(error)alert("Gagal daftar: "+error.message)
else alert("Akun berhasil dibuat! Cek email buat verifikasi, lalu login.")
})
</script>
</body>
</html>
